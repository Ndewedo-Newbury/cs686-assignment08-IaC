---
- name: Update packages, verify Docker, and report disk usage
  hosts: all
  become: true
  gather_facts: true

  tasks:

    # --- Update & upgrade packages ---

    - name: Update and upgrade packages (Amazon Linux)
      ansible.builtin.yum:
        name: "*"
        state: latest
      when: ansible_os_family == "RedHat"

    - name: Update and upgrade packages (Ubuntu)
      ansible.builtin.apt:
        upgrade: dist
        update_cache: true
      when: ansible_os_family == "Debian"

    # --- Install Docker if missing (Ubuntu) ---

    - name: Install Docker (Ubuntu)
      ansible.builtin.apt:
        name: docker.io
        state: present
      when: ansible_os_family == "Debian"

    # --- Verify Docker version ---

    - name: Get Docker version
      ansible.builtin.command: docker --version
      register: docker_version
      changed_when: false

    - name: Report Docker version
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} — {{ docker_version.stdout }}"

    # --- Disk usage ---

    - name: Report disk usage
      ansible.builtin.debug:
        msg: >
          {{ inventory_hostname }} — {{ item.mount }}:
          {{ item.block_used * item.block_size | human_readable }} used of
          {{ item.size_total | human_readable }}
          ({{ ((item.block_used / item.block_total) * 100) | round(1) }}%)
      loop: "{{ ansible_mounts }}"
      when: item.block_total > 0
